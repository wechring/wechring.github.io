<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wech Ring • Main</title>
    <link rel="icon" type="image/jpeg" href="/imgs/Logo.jpeg">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet" type="text/css">
    <style>
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - var(--header-h));
            align-items: stretch;
        }

        .hero-text-col {
            padding: 3rem 3rem 3rem 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-name {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(3rem, 5.5vw, 5rem);
            line-height: 1.05;
            margin-bottom: 0.5rem;
            color: var(--paper-bright);
        }

        .hero-name em {
            font-style: italic;
            color: var(--gold);
        }

        .tagline {
            font-size: 0.95rem;
            line-height: 1.8;
            color: rgba(232, 230, 224, 0.55);
            max-width: 380px;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .hero-img-col {
            position: relative;
            height: calc(100vh - var(--header-h));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--ink-3);
            padding: 3rem 3rem 5rem;
            overflow: hidden;
        }

        .portrait {
            position: relative;
            flex: 0 1 auto;
            max-height: calc(100% - 4rem);
            display: flex;
        }

        .portrait::before {
            content: '';
            position: absolute;
            inset: -14px;
            border: 0.5px solid rgba(201, 169, 110, 0.55);
            pointer-events: none;
        }

        .hero-img {
            max-width: min(100%, 380px);
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.7);
        }

        .portrait-caption {
            position: absolute;
            top: calc(100% + 1.6rem);
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(232, 230, 224, 0.35);
            white-space: nowrap;
        }

        .scroll-hint {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            color: rgba(232, 230, 224, 0.3);
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .scroll-line {
            width: 1px;
            height: 28px;
            background: linear-gradient(to bottom, rgba(201, 169, 110, 0.6), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {

            0%,
            100% {
                opacity: 0.4;
                transform: scaleY(1);
            }

            50% {
                opacity: 1;
                transform: scaleY(1.1);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .scroll-line {
                animation: none;
            }
        }

        .stats-bar {
            display: flex;
            gap: 2.5rem;
            padding: 1.5rem 4rem;
            border-top: 0.5px solid rgba(255, 255, 255, 0.06);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.06);
            background: var(--ink-2);
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-num {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem;
            color: var(--gold);
        }

        .stat-label {
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(232, 230, 224, 0.35);
        }

        @media (max-width: 768px) {
            .hero {
                grid-template-columns: 1fr;
                height: auto;
            }

            .hero-img-col {
                order: -1;
                height: auto;
                padding: 3rem 1.5rem 4.5rem;
            }

            .portrait {
                max-height: none;
            }

            .hero-img {
                max-width: min(75%, 320px);
                margin: 0 auto;
            }

            .scroll-hint {
                display: none;
            }

            .hero-text-col {
                padding: 3rem 1.5rem;
            }

            .stats-bar {
                padding: 1.2rem 1.5rem;
                gap: 1.5rem;
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="/" class="logo-text">WR</a>
        <nav>
            <ul>
                <li><a href="/" class="active">Home</a></li>
                <li><a href="/about-me">About</a></li>
                <li><a href="/roadmap">Roadmap</a></li>
                <li><a href="/projects">Projects</a></li>
                <li><a href="/contact-me">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text-col">
            <p class="eyebrow fade-in">Software Engineer &amp; Web Developer</p>
            <h1 class="hero-name fade-in">Wech<br><em>Ring</em></h1>
            <div class="divider fade-in"></div>
            <p class="tagline fade-in">Building thoughtful digital experiences — from clean architecture to polished
                interfaces.</p>
            <div class="cta-row fade-in">
                <a href="/projects" class="btn-primary">View Projects</a>
                <a href="/contact-me" class="btn-ghost">Get in Touch</a>
            </div>
        </div>

        <div class="hero-img-col">
            <figure class="portrait fade-in">
                <img src="/imgs/Portfolio1.png" alt="Wech Ring" class="hero-img">
                <figcaption class="portrait-caption">Wech Ring · Est. 2023</figcaption>
            </figure>
            <div class="accent-line"></div>
            <div class="accent-dot"></div>
            <div class="scroll-hint">
                <div class="scroll-line"></div>
                <span>Scroll</span>
            </div>
        </div>
    </section>

    <div class="stats-bar">
        <div class="stat">
            <span class="stat-num">3+</span>
            <span class="stat-label">Years exp.</span>
        </div>
        <div class="stat">
            <span class="stat-num">10+</span>
            <span class="stat-label">Projects</span>
        </div>
        <div class="stat">
            <span class="stat-num">Full</span>
            <span class="stat-label">Stack</span>
        </div>
    </div>

</body>

</html>
